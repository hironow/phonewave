version: 2

project_name: phonewave

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1 -short

builds:
  - main: ./cmd/phonewave/
    binary: phonewave
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hironow/phonewave/internal/cmd.Version={{.Version}}
      - -X github.com/hironow/phonewave/internal/cmd.Commit={{.Commit}}
      - -X github.com/hironow/phonewave/internal/cmd.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: hironow
      name: homebrew-tap
    homepage: "https://github.com/hironow/phonewave"
    description: "D-Mail courier daemon for AI agent tool repositories"
    license: "Apache-2.0"
    install: |
      bin.install "phonewave"
    test: |
      system "#{bin}/phonewave", "version"
