version: 2

project_name: phonewave

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1 -short

snapshot:
  version_template: "{{ incpatch .Version }}-next"

builds:
  - main: ./cmd/phonewave/
    binary: phonewave
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hironow/phonewave/internal/cmd.Version={{.Version}}
      - -X github.com/hironow/phonewave/internal/cmd.Commit={{.ShortCommit}}
      - -X github.com/hironow/phonewave/internal/cmd.Date={{.CommitDate}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

sboms:
  - artifacts: archive

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - ${artifact}
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: hironow
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hironow/phonewave"
    description: "D-Mail courier daemon"
    license: "Apache-2.0"
    install: |
      bin.install "phonewave"
      generate_completions_from_executable(bin/"phonewave", "completion")
    test: |
      system "#{bin}/phonewave", "version"
