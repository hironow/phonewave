rules:
  # ==========================================================================
  # phonewave-specific layer rules
  # Rules that reference phonewave domain concepts or literals
  # ==========================================================================

  # --- Rule: DaemonSession raw field access guard ---

  - id: daemon-session-direct-access
    languages: [go]
    severity: ERROR
    pattern-regex: '\bd\.session\.\w+'
    paths:
      include:
        - "/internal/session/**"
      exclude:
        - "*_test.go"
        - "**/internal/session/daemon_runner.go"
    message: |
      session 層で d.session.Method() の 2-level アクセスが検出されました。
      Why: DaemonSession への直接アクセスは Law of Demeter に違反し、内部構造への密結合を生む (Tell-Don't-Ask 原則)
      How: Daemon の forwarding メソッド経由でアクセスしてください（例: d.session.HasErrorQueue() → d.hasErrorQueue()）。forwarding メソッドは daemon_runner.go に定義してください

  # --- Rule: No state dir literal in filepath.Join ---

  - id: no-state-dir-literal-in-path-join
    languages: [go]
    severity: ERROR
    pattern-either:
      - pattern: filepath.Join($X, ".phonewave")
      - pattern: filepath.Join($X, ".phonewave", ...)
    paths:
      include:
        - "/internal/**"
      exclude:
        - "*_test.go"
        - "/internal/domain/**"
    message: |
      filepath.Join での state dir literal ".phonewave" 直書きは禁止です。
      Why: マジックストリングの散在は変更時の修正漏れやタイポを引き起こす
      How: domain.StateDir 定数を使用してください

  # --- Rule: No action dispatch in session ---

  - id: session-no-action-dispatch
    languages: [go]
    severity: ERROR
    patterns:
      - pattern: |
          switch $X.Action {
          ...
          }
      - pattern-inside: |
          func ($SELF *$TYPE) $METHOD(...) {
          ...
          }
    paths:
      include:
        - "/internal/session/**"
      exclude:
        - "*_test.go"
    message: |
      session 層での D-Mail action dispatch (switch dm.Action) は禁止です。
      Why: action dispatch は POLICY logic であり usecase 層の責務 (ADR S0034)
      How: usecase 層に FeedbackActionHandler/PreFlightTriager を実装し port 経由で委譲してください
