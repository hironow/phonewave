rules:
  # ==========================================================================
  # Layer dependency direction enforcement
  # 依存方向: cmd → session → root (逆方向禁止)
  #
  # phonewave は 2 層構造:
  #   internal/cmd     — cobra CLI (top layer)
  #   internal/session — I/O orchestration (filesystem, network, subprocess)
  #   phonewave (root) — types, constants, pure functions, go:embed
  #
  # Ref: phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
  # ==========================================================================

  # --- Rule 1: Root package must not import internal/ ---

  - id: layer-root-no-import-internal
    languages: [go]
    message: |
      root パッケージから internal/ への import は禁止です。
      依存方向: cmd → session → root（逆方向不可）
      root は types, constants, pure functions, go:embed のみ。
      I/O が必要な場合は internal/session/ に実装してください。
      Ref: docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/.*"
    paths:
      include:
        - "*.go"
      exclude:
        - "/internal/**"
        - "/cmd/**"

  # --- Rule 2: Session must not import cmd ---

  - id: layer-session-no-import-cmd
    languages: [go]
    message: |
      session 層から cmd 層への import は禁止です。
      依存方向: cmd → session（逆方向不可）
      session は root のみ import できます。
      Ref: docs/adr/S0005-root-infrastructure-and-layer-conventions.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/session/**"
